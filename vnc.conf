# LCD4Linux DPF 配置文件 - 竖排中文显示
# 配置说明：本配置用于在DPF（数字相框）上显示中文，支持横排和竖排文字

# ==================== 显示器配置 ====================
Display VNC {
    Driver       'VNC'
    Font         '/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc'
    FontSize     '24'        # 可选: 8-64
    Port         '5900'
    Xres         '300'
    Yres         '400'
    Bpp          '4'
}

# ==================== 时间变量配置 ====================
Variables {
    tick 500                           # 刷新间隔：500毫秒
    tack 200                           # 任务切换间隔：200毫秒
    minute 60000                       # 分钟变量：60000毫秒
}

# ==================== Widget控件配置 ====================

# 时间显示控件 - 第1行
# 显示格式：时:分:秒（如 14:30:45）
Widget Time {
    class 'Text'                       # 控件类型：文本
    expression strftime('时间 %H:%M:%S', time())  # 显示当前时间的表达式
    width 16                           # 字段宽度（字符数）
    speed 1000                         # 刷新速度（毫秒）
    fontsize 18                        # 字体大小（像素）
    font '/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc'  # 字体文件路径
    Foreground '00FF00'                 # 前景颜色（文字颜色）：白色 #FFFFFF
    Background '0000CD00' 
}

# 测试文字控件 - 第2行
# 显示中文和英文字符混合测试
Widget Test_24 {
    class 'Text'                       # 控件类型：文本
    expression '大字78--回-国'          # 显示的文本内容
    width 20                           # 字段宽度（字符数）
    fontsize 24                        # 字体大小（像素）
    font '/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc'  # 字体文件路径
    Foreground '00FF00'                 # 前景颜色（文字颜色）：白色 #FFFFFF
    Background '0000CD00' 
}

# 竖排文字控件 - 第3行
# 显示从上到下的竖排中文文字
# 注意：width必须 >= 字符数 × 3（UTF-8编码中文每个字占3字节）
Widget Test_V {
    class 'Text'                       # 控件类型：文本
    expression '竖排文字8'              # 竖排显示的文本内容（5个字符）
    width 20                           # 缓冲区大小（字符数），必须足够大
    fontsize 20                        # 字体大小（像素），每个字约23像素高
    textdir 3                          # 文字方向：0=左到右, 1=右到左, 2=下到上, 3=上到下（竖排）
    font '/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc'  # 字体文件路径
    Foreground '00FF00'                 # 前景颜色（文字颜色）：白色 #FFFFFF
    Background '0000CD00'
}

# 日期显示控件 - 第9行
# 显示格式：年-月-日（如 2026-03-27）
Widget Date {
    class 'Text'                       # 控件类型：文本
    expression strftime('%Y-%m-%d', time())  # 显示当前日期的表达式
    width 50                           # 字段宽度（字符数）
    fontsize 24                        # 字体大小（像素）
    font '/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc'  # 字体文件路径
    Foreground '00FF00'                 # 前景颜色（文字颜色）：白色 #FFFFFF
    Background '0000CD00'
}

# ==================== Graph 折线图控件 ====================
# AIDA64风格的折线图，显示历史数据变化趋势（如CPU/内存使用率）
# 宽度和高度单位为像素（默认40x20，最大500x300）
# 表达式使用真实CPU数据：proc_stat::cpu('busy', 500)
# 参数说明：
#   width/height = 像素尺寸
#   points = 数据点数量
#   value_size = 数值文字大小（6-24像素）
#   direction = 折线方向：0=从左到右, 1=从右到左
Widget CPU_Graph {
    class 'Graph'                      # 控件类型：折线图
    expression proc_stat::cpu('busy', 500)  # 实时CPU使用率(%)
    min 0                              # 最小值：0
    max 100                            # 最大值：100
    width 8                            # 图表宽度（像素）
    height 2                           # 图表高度（像素）
    points 500                          # 显示的数据点数量
    style 0                            # 样式：0=线图, 1=填充图
    grid 3                             # 网格线数量
    value 1                            # 是否显示数值：1=显示, 0=隐藏
    value_size 8                      # 数值文字大小（像素）
    value_precision 0                  # 小数位数：0, 1, 或 2
    value_unit                      # 单位后缀
    direction 0                        # 折线方向：0=从左到右, 1=从右到左
    update 500                        # 更新间隔（毫秒）
    line_color '00ff00'                # 折线颜色：绿色
    fill_color '00440080'              # 填充颜色：半透明绿色（RGBA）
    bg_color 'FF8000'                # 背景颜色：橙色
    grid_color '333333'              # 网格线颜色：半透明灰色（RGBA）
    text_color 'FFFFFF'                # 数值文字颜色：白色
    value_bg_color 'FF8000'          # 数值背景颜色：透明（RGBA），设置00000000为透明
}

# ==================== Arc 弧形仪表盘控件 ====================
# AIDA64风格的弧形仪表盘，显示当前数值（如温度、CPU使用率）
# 宽度和高度单位为像素
# AIDA64风格弧形仪表盘
Widget CPU_Arc {
    class 'Arc'                        # 控件类型：弧形仪表盘（AIDA64风格）
    expression proc_stat::cpu('busy', 500)  # 实时CPU使用率(%)
    min 0                              # 最小值：0%
    max 100                            # 最大值：100%
    diameter 100                       # 仪表盘直径（像素）
    thickness 20                        # 弧线粗细（像素）
    show_background 1                  # 显示背景：1=是, 0=否
    background_color '222222'          # 背景颜色：深灰色
    show_value  1                      # 显示数值：1=是, 0=否
    value_text_size 16                 # 数值文字大小（像素）
    value_text_color 'ffffff'          # 数值文字颜色：白色
    value_precision 0                  # 小数位数：0, 1, 或 2
    value_unit ''                     # 单位后缀
    
    # 指针设置
    show_needle 1                      # 显示指针：1=是, 0=否
    needle_length 23                   # 指针长度（像素），0=自动
    needle_width 2                     # 指针宽度（像素）
    needle_color 'ff0000'              # 指针颜色：红色
    center_color '444444'              # 指针原点颜色：深灰色
    
    # 数值位置
    text_below 1                       # 数值位置：1=指针下方, 0=弧线中心
    
    # 方向控制
    reverse 1                          # 反向：1=左到右, 0=右到左
    update 500                         # 更新间隔（毫秒）
    
    # 告警阈值（AIDA64风格）
    limit_1 33                         # 第一级阈值：33%（绿色→黄色）
    limit_2 66                         # 第二级阈值：66%（黄色→橙色）
    limit_3 90                         # 第三级阈值：90%（橙色→红色）
    
    # 各区间弧线颜色
    arc_color_min '00ff00'             # Min~Limit1：绿色（正常）
    arc_color_1 'ffff00'               # Limit1~Limit2：黄色（警告）
    arc_color_2 'ff8800'               # Limit2~Limit3：橙色（中度告警）
    arc_color_3 'ff0000'               # Limit3~Max：红色（严重告警）
    
    # 各区间背景颜色（透明）
    back_color_min '00000000'
    back_color_1 '00000000'
    back_color_2 '00000000'
    back_color_3 '00000000'
}

# 背景图片控件 - 用于显示背景图片
# 使用前请确保 /opt/bgnd.png 文件存在
Widget Bgnd {
    class 'Image'                      # 控件类型：图片
    file '/opt/bgnd-vnc.png'               # 背景图片文件路径
    update 1000                        # 更新间隔（毫秒）
    visible 1                          # 是否可见：1=显示, 0=隐藏
    inverted 0                         # 是否反转颜色：1=反转, 0=正常
}

# ==================== 屏幕布局配置 ====================
Layout Main {
    Layer 0 {                          # 图层0：文字和图表层
        Row1 {                         # 第1行（顶部）
            Col1 'Time'                # 显示时间控件
        }
        Row2 {                         # 第2行
            Col1 'Test_24'             # 显示测试文字控件
        }
        Row3 {                         # 第3行
            Col1 'Test_V'              # 显示竖排文字控件
        }
        Row3 {                         # 第3行
            Col2 'CPU_Graph'           # CPU使用率折线图
        }
        Row6 {                         # 第3行
            Col4 'CPU_Arc'           # CPU使用率折线图
        }
        Row9 {                         # 第9行（底部）
            Col1 'Date'                # 显示日期控件
        }
    }
    
    Layer 1 {                          # 图层1：背景图片层（在文字下方）

        }

    Layer 2 {                          # 图层2：背景图片层（在文字下方）
        X1.Y1 'Bgnd'                  # 背景图片位置
    }
}

# ==================== 默认显示和布局 ====================
Display 'VNC'                          # 默认使用的显示器
Layout 'Main'                          # 默认使用的布局

# 环形进度条控件
Widget CPU_Ring {
    class 'Ring'
    expression proc_stat::cpu('busy', 500)
    min 0
    max 100
    diameter 80
    thickness 8
    start_angle 270
    show_value 1
    value_text_size 14
    value_precision 0
    value_unit '%'
    value_text_color 'ffffff'
    show_background 1
    background_color '333333'
    ring_color '00ff00'
    update 500
}
